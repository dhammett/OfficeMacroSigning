name: code-signing
run-name: Code Signing
on:
  pull_request:
    types:
      - opened
  merge_group:
  workflow_dispatch:

jobs:
  code-signing-labeler:
    name: code-signing-labeler
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Label Pull Request
        uses: actions/labeler@v6
